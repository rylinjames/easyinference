version: "1"
name: dynamo-disagg-lmcache-qwen3-coder-480b
description: Disaggregated Dynamo serving for Qwen3-Coder-480B with LMCache, KV-aware routing, and separate prefill/decode observability.
engine: dynamo
workload: qwen3-coder-kv-stress
benchmark_role: benchmark
model: Qwen3-Coder-480B-A35B-Instruct
target_gpu_families: [hopper, blackwell, blackwell_ultra]
target_model_classes: [classical_moe]
focus_areas: [disaggregation, lmcache, long_context, coding, reliability, observability]
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: LMCacheConnectorV1
  notes:
    - Frontend should run in KV-router mode and keep request IDs stable across worker migration.
    - Prefill and decode workers must expose separate DYN_SYSTEM_PORT values for metrics and health checks.
cache:
  strategy: lmcache
  tiers: [gpu_hbm, cpu_dram, remote_cache]
  connector: LMCacheConnectorV1
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - Use this lane to validate split prefill/decode under long-context coding load with cache reuse intact.
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: named_override
    override_key: frontend
    expected_engine: dynamo
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: dynamo
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: dynamo
tags: [dynamo, disagg, lmcache, qwen3-coder, coding, production]
