version: "1"
name: dynamo-aggregated-lmcache-qwen3-coder-480b
description: Aggregated Dynamo serving for Qwen3-Coder-480B with LMCache enabled and frontend plus worker observability.
engine: dynamo
workload: qwen3-coder-kv-stress
benchmark_role: benchmark
model: Qwen3-Coder-480B-A35B-Instruct
target_gpu_families: [hopper, blackwell, blackwell_ultra]
target_model_classes: [classical_moe]
focus_areas: [aggregated, lmcache, long_context, coding, reliability, observability]
topology:
  mode: single_endpoint
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  notes:
    - Scrape frontend and worker metrics separately. Frontend exposes queue and migration counters; worker exposes KV stats.
cache:
  strategy: lmcache
  tiers: [gpu_hbm, remote_cache]
  connector: LMCacheConnectorV1
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - Use this lane as the production aggregated control before enabling split prefill/decode.
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: named_override
    override_key: frontend
    expected_engine: dynamo
  - name: worker
    role: other
    endpoint_source: named_override
    override_key: worker
    expected_engine: dynamo
tags: [dynamo, aggregated, lmcache, qwen3-coder, coding, production]
