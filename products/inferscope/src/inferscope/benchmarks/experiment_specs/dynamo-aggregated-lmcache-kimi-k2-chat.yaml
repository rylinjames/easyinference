version: "1"
name: dynamo-aggregated-lmcache-kimi-k2-chat
description: Aggregated Dynamo serving for Kimi-K2.5 with LMCache, benchmarked using long-context chat with technical discussion and code context.
engine: dynamo
workload: kimi-k2-long-context-chat
benchmark_role: production
model: Kimi-K2.5
target_gpu_families: [hopper, blackwell, blackwell_ultra]
target_model_classes: [classical_moe]
focus_areas: [aggregated, lmcache, long_context, chat, multi_turn, prefix_cache, reliability, observability]
topology:
  mode: single_endpoint
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  notes:
    - Multi-turn chat sessions with shared code context prefix.
    - Higher concurrency (8) than coding workload reflects real chat usage patterns.
cache:
  strategy: lmcache
  tiers: [gpu_hbm, remote_cache]
  connector: LMCacheConnectorV1
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - Chat workload tests prefix reuse under higher concurrency than coding.
    - Monitor TTFT p95 closely as chat has tighter latency SLOs than coding.
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: named_override
    override_key: frontend
    expected_engine: dynamo
  - name: worker
    role: other
    endpoint_source: named_override
    override_key: worker
    expected_engine: dynamo
tags: [dynamo, aggregated, lmcache, kimi, chat, long-context, production]
