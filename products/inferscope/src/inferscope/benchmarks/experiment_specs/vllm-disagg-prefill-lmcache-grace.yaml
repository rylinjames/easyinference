version: "1"
name: vllm-disagg-prefill-lmcache-grace
description: vLLM prefill/decode split benchmark with LMCache and a Grace-aware KV overflow tier for realistic long-context serving studies.
engine: vllm
workload: long-context-kv-offload-rag
benchmark_role: topology_probe
target_gpu_families: [hopper_grace, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [dense_gqa, qwen35_hybrid, frontier_mla_moe]
focus_areas: [grace_overflow, lmcache, kv_offload, long_context]
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: LMCacheConnectorV1
  notes:
    - Intended for GB200, GB300, or GH200-class systems where coherent overflow can absorb cold KV.
cache:
  strategy: lmcache
  tiers: [gpu_hbm, grace_coherent, remote_cache]
  connector: LMCache
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - Grace coherent tier is modeled explicitly as the first overflow layer ahead of remote LMCache reuse.
    - Use this lane to study long-context RAG and cold-session recall under realistic operator constraints.
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [vllm, disagg, lmcache, grace, long-context, kv-offload]
