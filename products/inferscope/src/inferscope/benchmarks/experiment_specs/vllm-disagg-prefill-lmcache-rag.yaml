version: "1"
name: vllm-disagg-prefill-lmcache-rag
description: vLLM prefill/decode split benchmark with LMCache-backed remote KV reuse for realistic long-context RAG studies.
engine: vllm
workload: long-context-kv-offload-rag
benchmark_role: topology_probe
target_gpu_families: [hopper, hopper_grace, blackwell, blackwell_ultra, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [dense_gqa, qwen35_hybrid, frontier_mla_moe]
focus_areas: [lmcache, kv_offload, disaggregation, long_context]
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: LMCacheConnectorV1
cache:
  strategy: lmcache
  tiers: [gpu_hbm, cpu_dram, remote_cache]
  connector: LMCache
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - Use this lane to compare single-endpoint host spill versus remote KV reuse in disaggregated serving.
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [vllm, disagg, lmcache, rag, long-context]
