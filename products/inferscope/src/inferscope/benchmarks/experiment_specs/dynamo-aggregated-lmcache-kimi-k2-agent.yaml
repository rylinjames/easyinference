version: "1"
name: dynamo-aggregated-lmcache-kimi-k2-agent
description: Aggregated Dynamo serving for Kimi-K2.5 with LMCache, benchmarked using real CoderForge agent trajectories with tool calling.
engine: dynamo
workload: kimi-k2-coderforge-agent
benchmark_role: production
model: Kimi-K2.5
target_gpu_families: [hopper, blackwell, blackwell_ultra]
target_model_classes: [classical_moe]
focus_areas: [aggregated, lmcache, agent, tool_calling, multi_turn, prefix_cache, reliability, observability]
topology:
  mode: single_endpoint
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  notes:
    - Agent trajectories have 4-8 tool-calling turns per session — high KV cache reuse.
    - Tool schemas in the system prompt form a shared prefix across all turns.
cache:
  strategy: lmcache
  tiers: [gpu_hbm, remote_cache]
  connector: LMCacheConnectorV1
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - Tool-calling workloads have structured context growth — tool_call + tool_result messages accumulate.
    - Monitor ITL closely as agent turns depend on consistent decode latency for tool-call response parsing.
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: named_override
    override_key: frontend
    expected_engine: dynamo
  - name: worker
    role: other
    endpoint_source: named_override
    override_key: worker
    expected_engine: dynamo
tags: [dynamo, aggregated, lmcache, kimi, agent, coderforge, production]
