version: "1"
name: vllm-disagg-prefill-lmcache
description: vLLM prefill/decode split comparison benchmark for Kimi-K2.5 with LMCache-backed KV reuse.
engine: vllm
workload: kimi-k2-long-context-coding
benchmark_role: comparison
model: Kimi-K2.5
target_gpu_families: [hopper, blackwell, blackwell_ultra]
target_model_classes: [classical_moe]
focus_areas: [disaggregation, lmcache, prefix_cache, long_context, coding, observability]
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
cache:
  strategy: lmcache
  tiers: [gpu_hbm, cpu_dram, remote_cache]
  connector: LMCacheConnectorV1
  session_affinity: true
  prefix_cache_expected: true
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [vllm, disagg, lmcache, kimi, coding, comparison]
