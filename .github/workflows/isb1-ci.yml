name: ISB-1 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    defaults:
      run:
        working-directory: products/isb1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Validate benchmark configs
        run: |
          python -m harness.config_validator --all-yaml --config-root configs
          python -m harness.config_validator --sweep configs/sweep/core.yaml --config-root configs
      - name: Ruff lint
        run: python -m ruff check .
      - name: Black format check
        run: python -m black --check .
      - name: Pytest
        run: python -m pytest tests/ -v --tb=short
